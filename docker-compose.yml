services:
  mcp-memory:
    image: python:3.12-slim
    container_name: brian-mcp-memory
    restart: unless-stopped
    working_dir: /app
    command: >
      bash -c "pip install mcp-memory-service --quiet &&
               python -m mcp_memory_service.server"
    environment:
      MCP_MEMORY_CHROMA_PATH: ${MCP_MEMORY_CHROMA_PATH:-/data/memory}
      MCP_MEMORY_BACKUPS_PATH: ${MCP_MEMORY_BACKUPS_PATH:-/data/backups}
      MCP_SSE_HOST: ${MCP_SSE_HOST:-0.0.0.0}
      MCP_SSE_PORT: ${MCP_SSE_PORT:-8765}
      MCP_STREAMABLE_HTTP_MODE: ${MCP_STREAMABLE_HTTP_MODE:-1}
      MCP_OAUTH_ENABLED: ${MCP_OAUTH_ENABLED:-false}
    volumes:
      - /volume1/docker/brian-mcp/memory:/data/memory
      - /volume1/docker/brian-mcp/backups:/data/backups
    ports:
      - "8765:8765"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: brian-mcp-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      mcp-memory:
        condition: service_healthy
