services:
  mcp-memory:
    image: ghcr.io/aldarondo/brian-mcp-memory:latest
    container_name: brian-mcp-memory
    restart: unless-stopped
    environment:
      MCP_MEMORY_CHROMA_PATH: ${MCP_MEMORY_CHROMA_PATH:-/data/memory}
      MCP_MEMORY_BACKUPS_PATH: ${MCP_MEMORY_BACKUPS_PATH:-/data/backups}
      MCP_SSE_HOST: ${MCP_SSE_HOST:-0.0.0.0}
      MCP_SSE_PORT: ${MCP_SSE_PORT:-8765}
      MCP_STREAMABLE_HTTP_MODE: ${MCP_STREAMABLE_HTTP_MODE:-1}
      MCP_OAUTH_ENABLED: ${MCP_OAUTH_ENABLED:-false}
    volumes:
      - /volume1/docker/brian-mcp/memory:/data/memory
      - /volume1/docker/brian-mcp/backups:/data/backups
    ports:
      - "8765:8765"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import socket, sys; s=socket.socket(); s.settimeout(5); r=s.connect_ex(('127.0.0.1', 8765)); s.close(); sys.exit(0 if r==0 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: brian-mcp-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      mcp-memory:
        condition: service_healthy
    profiles:
      - tunnel
