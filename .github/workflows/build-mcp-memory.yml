name: Build and push MCP memory image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/build-mcp-memory.yml
  schedule:
    # Rebuild weekly (Sunday 03:00 UTC) to pick up Python base image + mcp-memory-service patches
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/brian-mcp-memory:latest
            ghcr.io/${{ github.repository_owner }}/brian-mcp-memory:${{ github.sha }}
