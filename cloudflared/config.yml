# Cloudflare Tunnel config
# This file is used when running cloudflared with credentials file (alternative to TUNNEL_TOKEN env var).
# If using TUNNEL_TOKEN in docker-compose.yml, this file is not needed.
#
# tunnel: <your-tunnel-id>
# credentials-file: /etc/cloudflared/credentials.json
#
# ingress:
#   - hostname: brian.<your-domain>.com
#     service: http://mcp-memory:8765
#   - service: http_status:404
